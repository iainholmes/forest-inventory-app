<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-label="Forest Inventory">
  <!-- Rounded square background -->
  <rect width="512" height="512" rx="96" fill="#2d4a2b"/>

  <!-- Contour rings — suggestive of topographic lines around a peak -->
  <g fill="none" stroke="#a8c89e" stroke-width="6" stroke-linecap="round" opacity="0.55">
    <ellipse cx="256" cy="320" rx="180" ry="56"/>
    <ellipse cx="256" cy="296" rx="148" ry="44"/>
    <ellipse cx="256" cy="272" rx="116" ry="34"/>
    <ellipse cx="256" cy="248" rx="86" ry="26"/>
  </g>

  <!-- Stylized tree silhouette -->
  <!-- Crown: three stacked triangular tiers, evoking conifer but abstracted -->
  <g fill="#f5f3ee">
    <path d="M 256 96
             L 320 184
             L 290 184
             L 344 252
             L 308 252
             L 358 320
             L 154 320
             L 204 252
             L 168 252
             L 222 184
             L 192 184
             Z"/>
    <!-- Trunk -->
    <rect x="240" y="320" width="32" height="48" rx="3"/>
  </g>

  <!-- Subtle ground line -->
  <line x1="120" y1="372" x2="392" y2="372" stroke="#a8c89e" stroke-width="4" stroke-linecap="round" opacity="0.7"/>
</svg>
